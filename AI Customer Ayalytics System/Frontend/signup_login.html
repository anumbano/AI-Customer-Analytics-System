<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Signup - ClarityAI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            color: #333;
            line-height: 1.6;
            background: linear-gradient(135deg, #f0f7ff 0%, #e0f4ff 50%, #f0f9ff 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        /* Container */
        .auth-container {
            width: 100%;
            max-width: 420px;
        }

        /* Auth Card */
        .auth-card {
            background: white;
            border-radius: 20px;
            padding: 2.5rem;
            box-shadow: 0 20px 60px rgba(0, 102, 204, 0.15);
            animation: slideIn 0.4s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Logo */
        .auth-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: #0066cc;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
        }

        .logo-text {
            font-size: 1.3rem;
            font-weight: 700;
            color: #0066cc;
        }

        /* Header */
        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-header h1 {
            font-size: 1.8rem;
            color: #0a0e27;
            margin-bottom: 0.5rem;
            font-weight: 800;
        }

        .auth-header p {
            color: #666;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        /* Tab Toggle */
        .tab-toggle {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
            background: #f3f4f6;
            padding: 0.35rem;
            border-radius: 10px;
            width: 100%;
        }

        .tab-btn {
            flex: 1;
            padding: 0.65rem 1rem;
            border: none;
            background: transparent;
            color: #666;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            background: white;
            color: #0066cc;
            box-shadow: 0 2px 8px rgba(0, 102, 204, 0.1);
        }

        /* Form Container */
        .form-container {
            display: none;
        }

        .form-container.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        /* Form Group */
        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            color: #0a0e27;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }

        .form-group input {
            width: 100%;
            padding: 0.85rem 1rem;
            border: 1.5px solid #e5e7eb;
            border-radius: 10px;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .form-group input:focus {
            outline: none;
            border-color: #0066cc;
            box-shadow: 0 0 0 3px rgba(0, 102, 204, 0.1);
        }

        .form-group input::placeholder {
            color: #bbb;
        }

        /* Error Message */
        .error-message {
            display: none;
            margin-bottom: 1.25rem;
            padding: 0.85rem 1rem;
            background: #fee2e2;
            color: #991b1b;
            border-radius: 10px;
            border: 1px solid #fecaca;
            font-size: 0.85rem;
            animation: slideIn 0.3s ease;
        }

        .error-message.show {
            display: block;
        }

        /* Success Message */
        .success-message {
            display: none;
            margin-bottom: 1.25rem;
            padding: 0.85rem 1rem;
            background: #dcfce7;
            color: #166534;
            border-radius: 10px;
            border: 1px solid #bbf7d0;
            font-size: 0.85rem;
            animation: slideIn 0.3s ease;
        }

        .success-message.show {
            display: block;
        }

        /* Submit Button */
        .submit-btn {
            width: 100%;
            padding: 1rem;
            background: #0066cc;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 1.25rem;
        }

        .submit-btn:hover:not(:disabled) {
            background: #0052a3;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 102, 204, 0.3);
        }

        .submit-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .spinner {
            display: none;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        .spinner.show {
            display: block;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Footer Text */
        .auth-footer {
            text-align: center;
            font-size: 0.85rem;
            color: #666;
        }

        .auth-footer a {
            color: #0066cc;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s ease;
        }

        .auth-footer a:hover {
            opacity: 0.8;
        }

        /* Back Link */
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            color: #0066cc;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.85rem;
            margin-bottom: 2rem;
            transition: all 0.2s ease;
        }

        .back-link:hover {
            gap: 0.5rem;
        }

        /* Password Toggle */
        .password-toggle {
            position: relative;
        }

        .toggle-btn {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: #888;
            font-size: 1rem;
            padding: 0.25rem;
        }

        .toggle-btn:hover {
            color: #0066cc;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .auth-card {
                padding: 2rem 1.5rem;
                border-radius: 16px;
            }

            .auth-header h1 {
                font-size: 1.5rem;
            }

            .form-group input {
                padding: 0.75rem 0.85rem;
                font-size: 0.9rem;
            }

            .submit-btn {
                padding: 0.9rem;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <!-- Logo -->
        <div class="auth-logo">
            <div class="logo-icon">📊</div>
            <div class="logo-text">ClarityAI</div>
        </div>

        <!-- Auth Card -->
        <div class="auth-card">

            <!-- Back Link -->
            <a href="home.html" class="back-link">← Back to Home</a>

            <!-- Header -->
            <div class="auth-header">
                <h1 id="authTitle">Sign Up</h1>
                <p id="authSubtitle">Create your account to get started with AI-powered customer analytics</p>
            </div>

            <!-- Tab Toggle -->
            <div class="tab-toggle">
                <button class="tab-btn active" data-tab="signup">Sign Up</button>
                <button class="tab-btn" data-tab="login">Login</button>
            </div>

            <!-- Sign Up Form -->
            <div class="form-container active" id="signupForm">
                <div class="error-message" id="signupError"></div>
                <div class="success-message" id="signupSuccess"></div>

                <div class="form-group">
                    <label for="signupFirstName">First Name</label>
                    <input type="text" id="signupFirstName" placeholder="John" required>
                </div>

                <div class="form-group">
                    <label for="signupLastName">Last Name</label>
                    <input type="text" id="signupLastName" placeholder="Doe" required>
                </div>

                <div class="form-group">
                    <label for="signupEmail">Email</label>
                    <input type="email" id="signupEmail" placeholder="john@example.com" required>
                </div>

                <div class="form-group">
                    <label for="signupPassword">Password</label>
                    <div class="password-toggle">
                        <input type="password" id="signupPassword" placeholder="Create a strong password" required>
                        <button type="button" class="toggle-btn" onclick="togglePassword('signupPassword')">👁</button>
                    </div>
                </div>

                <div class="form-group">
                    <label for="signupConfirmPassword">Confirm Password</label>
                    <div class="password-toggle">
                        <input type="password" id="signupConfirmPassword" placeholder="Confirm your password" required>
                        <button type="button" class="toggle-btn" onclick="togglePassword('signupConfirmPassword')">👁</button>
                    </div>
                </div>

                <button class="submit-btn" onclick="handleSignup()">
                    <span class="spinner" id="signupSpinner"></span>
                    <span>Create Account</span>
                </button>

                <div class="auth-footer">
                    Already have an account? <a onclick="switchTab('login')">Login here</a>
                </div>
            </div>

            <!-- Login Form -->
            <div class="form-container" id="loginForm">
                <div class="error-message" id="loginError"></div>
                <div class="success-message" id="loginSuccess"></div>

                <div class="form-group">
                    <label for="loginEmail">Email</label>
                    <input type="email" id="loginEmail" placeholder="john@example.com" required>
                </div>

                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <div class="password-toggle">
                        <input type="password" id="loginPassword" placeholder="Enter your password" required>
                        <button type="button" class="toggle-btn" onclick="togglePassword('loginPassword')">👁</button>
                    </div>
                </div>

                <button class="submit-btn" onclick="handleLogin()">
                    <span class="spinner" id="loginSpinner"></span>
                    <span>Login</span>
                </button>

                <div class="auth-footer">
                    Don't have an account? <a onclick="switchTab('signup')">Sign up here</a>
                </div>
            </div>

        </div>
    </div>

    <script>
        const STORAGE_KEY = 'clarityai_users';

        // Get users from localStorage
        function getUsers() {
            const data = localStorage.getItem(STORAGE_KEY);
            return data ? JSON.parse(data) : [];
        }

        // Save users to localStorage
        function saveUsers(users) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(users));
        }

        // Get current logged-in user
        function getCurrentUser() {
            return localStorage.getItem('clarityai_current_user');
        }

        // Set current logged-in user
        function setCurrentUser(email) {
            localStorage.setItem('clarityai_current_user', email);
        }

        // Logout user
        function logoutUser() {
            localStorage.removeItem('clarityai_current_user');
        }

        // Switch tabs
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.form-container').forEach(form => form.classList.remove('active'));

            if (tab === 'signup') {
                document.querySelector('[data-tab="signup"]').classList.add('active');
                document.getElementById('signupForm').classList.add('active');
                document.getElementById('authTitle').textContent = 'Sign Up';
                document.getElementById('authSubtitle').textContent = 'Create your account to get started with AI-powered customer analytics';
            } else if (tab === 'login') {
                document.querySelector('[data-tab="login"]').classList.add('active');
                document.getElementById('loginForm').classList.add('active');
                document.getElementById('authTitle').textContent = 'Login';
                document.getElementById('authSubtitle').textContent = 'Login to your account to access your analytics';
            }

            // Clear errors
            document.querySelectorAll('.error-message').forEach(msg => msg.classList.remove('show'));
            document.querySelectorAll('.success-message').forEach(msg => msg.classList.remove('show'));
        }

        // Tab button listeners
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                switchTab(this.getAttribute('data-tab'));
            });
        });

        // Toggle password visibility
        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text';
            } else {
                input.type = 'password';
            }
        }

        // Show error message
        function showError(containerId, message) {
            const errorEl = document.getElementById(containerId);
            errorEl.textContent = message;
            errorEl.classList.add('show');
            setTimeout(() => {
                errorEl.classList.remove('show');
            }, 5000);
        }

        // Show success message
        function showSuccess(containerId, message) {
            const successEl = document.getElementById(containerId);
            successEl.textContent = message;
            successEl.classList.add('show');
            setTimeout(() => {
                successEl.classList.remove('show');
            }, 5000);
        }

        // Validate email
        function isValidEmail(email) {
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return emailRegex.test(email);
        }

        // Handle signup
        function handleSignup() {
            const firstName = document.getElementById('signupFirstName').value.trim();
            const lastName = document.getElementById('signupLastName').value.trim();
            const email = document.getElementById('signupEmail').value.trim();
            const password = document.getElementById('signupPassword').value;
            const confirmPassword = document.getElementById('signupConfirmPassword').value;

            // Validation
            if (!firstName) {
                showError('signupError', 'Please enter your first name');
                return;
            }

            if (!lastName) {
                showError('signupError', 'Please enter your last name');
                return;
            }

            if (!email) {
                showError('signupError', 'Please enter your email');
                return;
            }

            if (!isValidEmail(email)) {
                showError('signupError', 'Please enter a valid email');
                return;
            }

            if (!password) {
                showError('signupError', 'Please enter a password');
                return;
            }

            if (password.length < 6) {
                showError('signupError', 'Password must be at least 6 characters');
                return;
            }

            if (password !== confirmPassword) {
                showError('signupError', 'Passwords do not match');
                return;
            }

            // Check if user already exists
            const users = getUsers();
            if (users.find(u => u.email === email)) {
                showError('signupError', 'User with this email already exists');
                return;
            }

            // Show loading state
            const spinner = document.getElementById('signupSpinner');
            spinner.classList.add('show');
            document.querySelector('#signupForm .submit-btn').disabled = true;

            // Simulate API call
            setTimeout(() => {
                // Add new user
                const newUser = {
                    firstName,
                    lastName,
                    email,
                    password: btoa(password), // Simple encoding (not secure for production)
                    createdAt: new Date().toISOString()
                };

                users.push(newUser);
                saveUsers(users);

                // Set as current user and redirect
                setCurrentUser(email);

                spinner.classList.remove('show');
                document.querySelector('#signupForm .submit-btn').disabled = false;

                showSuccess('signupSuccess', 'Account created successfully! Redirecting...');

                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1500);
            }, 1200);
        }

        // Handle login
        function handleLogin() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;

            // Validation
            if (!email) {
                showError('loginError', 'Please enter your email');
                return;
            }

            if (!password) {
                showError('loginError', 'Please enter your password');
                return;
            }

            // Show loading state
            const spinner = document.getElementById('loginSpinner');
            spinner.classList.add('show');
            document.querySelector('#loginForm .submit-btn').disabled = true;

            // Simulate API call
            setTimeout(() => {
                const users = getUsers();
                const user = users.find(u => u.email === email && u.password === btoa(password));

                if (!user) {
                    spinner.classList.remove('show');
                    document.querySelector('#loginForm .submit-btn').disabled = false;
                    showError('loginError', 'Invalid email or password');
                    return;
                }

                // Login successful
                setCurrentUser(email);

                spinner.classList.remove('show');
                document.querySelector('#loginForm .submit-btn').disabled = false;

                showSuccess('loginSuccess', `Welcome back, ${user.firstName}! Redirecting...`);

                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1500);
            }, 1200);
        }

        // Enter key support
        document.getElementById('signupFirstName').addEventListener('keypress', e => e.key === 'Enter' && handleSignup());
        document.getElementById('signupLastName').addEventListener('keypress', e => e.key === 'Enter' && handleSignup());
        document.getElementById('signupEmail').addEventListener('keypress', e => e.key === 'Enter' && handleSignup());
        document.getElementById('signupPassword').addEventListener('keypress', e => e.key === 'Enter' && handleSignup());
        document.getElementById('signupConfirmPassword').addEventListener('keypress', e => e.key === 'Enter' && handleSignup());

        document.getElementById('loginEmail').addEventListener('keypress', e => e.key === 'Enter' && handleLogin());
        document.getElementById('loginPassword').addEventListener('keypress', e => e.key === 'Enter' && handleLogin());


    </script>
</body>
</html>
